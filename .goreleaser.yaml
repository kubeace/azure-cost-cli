version: 2

project_name: azcost

before:
  hooks:
    - go mod tidy

builds:
  - id: azcost
    main: ./cmd/azcost
    binary: azcost
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: azcost
    name_template: >-
      azcost_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - examples/*

checksum:
  name_template: 'checksums.txt'

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  draft: true
  prerelease: auto
  header: |
    ## azcost {{ .Tag }}

    Install:
    ```bash
    go install github.com/kubeace/azure-cost-cli/cmd/azcost@{{ .Tag }}
    ```
    or download a pre-built binary below.
