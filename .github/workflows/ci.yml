name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: gofmt
        if: matrix.os == 'ubuntu-latest'
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "::error::gofmt diff:"; echo "$out"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: test
        run: go test -race -count=1 -cover ./...

      - name: build
        run: go build -o azcost ./cmd/azcost

      - name: smoke
        run: ./azcost --version
        shell: bash

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          args: --timeout=5m
